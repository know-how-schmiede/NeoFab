{% extends "base.html" %}

{% block title %}{{ t("new_order") }} – NeoFab{% endblock %}

{% block content %}

<div class="card mb-3">
  <div class="card-header">
    <h2 class="h5 mb-0">
      <i class="bi bi-plus-circle me-1"></i>
      {{ t("new_order_page_header") }}
    </h2>
  </div>

  <div class="card-body">
    <form method="post" enctype="multipart/form-data" data-single-submit-form>
      <input type="hidden" name="form_token" value="{{ form_token }}">

      <div class="row g-3">

        <!-- Title -->
        <div class="col-12">
          <label for="title" class="form-label">
            <i class="bi bi-card-text me-1"></i>
            {{ t("new_order_title_label") }}*
          </label>
          <input
            type="text"
            class="form-control"
            id="title"
            name="title"
            required
          >
        </div>

        <!-- Description -->
        <div class="col-12">
          <label for="description" class="form-label">
            <i class="bi bi-journal-text me-1"></i>
            {{ t("new_order_description_label") }}
          </label>
          <textarea
            class="form-control"
            id="description"
            name="description"
            rows="4"
          ></textarea>
        </div>

        <!-- Cost Center -->
        <div class="col-md-6">
          <label for="cost_center_id" class="form-label">
            <i class="bi bi-bank me-1"></i>
            {{ t("new_order_cost_center_label") }}
          </label>
          <select
            id="cost_center_id"
            name="cost_center_id"
            class="form-select"
          >
            <option value="">{{ t("select_placeholder") }}</option>
            {% for cc in cost_centers %}
              <option value="{{ cc.id }}">{{ cc.name }}</option>
            {% endfor %}
          </select>
        </div>

        <!-- Printer Profile -->
        <div class="col-md-6">
          <label for="printer_profile_id" class="form-label">
            <i class="bi bi-printer me-1"></i>
            {{ t("new_order_printer_profile_label") }}
          </label>
          <select
            id="printer_profile_id"
            name="printer_profile_id"
            class="form-select"
          >
            <option value="">{{ t("select_placeholder") }}</option>
            {% for p in printer_profiles %}
              <option value="{{ p.id }}">{{ p.name }}</option>
            {% endfor %}
          </select>
        </div>

        <!-- Filament Material -->
        <div class="col-md-6">
          <label for="filament_material_id" class="form-label">
            <i class="bi bi-droplet me-1"></i>
            {{ t("new_order_filament_material_label") }}
          </label>
          <select
            id="filament_material_id"
            name="filament_material_id"
            class="form-select"
          >
            <option value="">{{ t("select_placeholder") }}</option>
            {% for f in filament_materials %}
              <option value="{{ f.id }}">{{ f.name }}</option>
            {% endfor %}
          </select>
        </div>

        {% if current_user.role == 'admin' %}
        <!-- Status (nur Admin) -->
        <div class="col-md-6">
          <label for="status" class="form-label">
            <i class="bi bi-flag me-1"></i>
            {{ t("new_order_status_label") }}
          </label>
          <select
            id="status"
            name="status"
            class="form-select"
          >
            {% for value, label in order_statuses %}
              <option value="{{ value }}">{{ label }}</option>
            {% endfor %}
          </select>
        </div>
        {% endif %}

      </div>

      <!-- Buttons -->
      <div class="d-flex gap-2 mt-3">
        <button type="submit" class="btn btn-primary" data-submit-once>
          <i class="bi bi-save me-1"></i>
          <span data-submit-label>{{ t("btn_create_order") }}</span>
        </button>
        <a href="{{ url_for('dashboard') }}" class="btn btn-secondary">
          <i class="bi bi-arrow-left me-1"></i>
          {{ t("btn_back_dashboard") }}
        </a>
      </div>

    </form>
  </div>
</div>

{% endblock %}

{% block scripts %}
<script>
document.addEventListener("DOMContentLoaded", function() {
  document.querySelectorAll("[data-single-submit-form]").forEach((form) => {
    form.addEventListener("submit", function(event) {
      const submitButton = form.querySelector("[data-submit-once]");
      if (!submitButton) return;

      if (submitButton.disabled) {
        event.preventDefault();
        return;
      }

      submitButton.disabled = true;
      submitButton.classList.add("disabled");
      const label = submitButton.querySelector("[data-submit-label]");
      if (label) {
        label.textContent = "{{ t('btn_saving') }}";
      }
      const icon = submitButton.querySelector("i");
      if (icon) {
        icon.className = "spinner-border spinner-border-sm me-1";
      }
    });
  });
});
</script>
{% endblock %}
